<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spellbook of Words & Life</title>
  <style>
    body {
      font-family: "Georgia", serif;
      background: #0b1020;
      color: #f5f0d7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .spellbook {
      background: #1b2236;
      border: 3px solid #c9a96b;
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-size: 1.6rem;
      text-align: center;
      margin-bottom: 10px;
    }

    p.subtitle {
      font-size: 0.9rem;
      text-align: center;
      color: #d7c9a0;
      margin-top: 0;
      margin-bottom: 18px;
    }

    label {
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #c9a96b;
      background: #101528;
      color: #f5f0d7;
      font-size: 0.95rem;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #c9a96b;
      color: #1b2236;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e0c48a;
    }

    .result {
      margin-top: 18px;
      padding-top: 10px;
      border-top: 1px dashed #c9a96b;
      min-height: 60px;
    }

    .word {
      font-weight: bold;
      font-size: 1.1rem;
    }

    .definition {
      margin-top: 4px;
      font-size: 0.95rem;
    }

    .life-tip {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #e3d7b0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="spellbook">
    <h1>Spellbook of Words</h1>
    <p class="subtitle">Type a word. Cast a spell. Learn a little life.</p>

    <label for="wordInput">Your word:</label>
    <input id="wordInput" type="text" placeholder="e.g. courage, patience, hope" />

    <button id="castSpellBtn">Cast Spell</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    const dictionary = {
      courage: {
        definition: "The strength to face fear, pain, or difficulty.",
        lifeTip: "Courage doesn’t mean you’re not afraid—it means you move gently forward anyway."
      },
      patience: {
        definition: "The ability to wait calmly without frustration.",
        lifeTip: "Slow growth is still growth. Give yourself time to bloom."
      },
      hope: {
        definition: "A feeling of expectation and desire for a certain thing to happen.",
        lifeTip: "Even a tiny bit of hope can be a lantern in a long hallway."
      },
      kindness: {
        definition: "The quality of being friendly, generous, and considerate.",
        lifeTip: "Small kindnesses often become the moments people remember the longest."
      }
    };

    const wordInput = document.getElementById("wordInput");
    const castSpellBtn = document.getElementById("castSpellBtn");
    const resultDiv = document.getElementById("result");

    castSpellBtn.addEventListener("click", () => {
      const rawWord = wordInput.value.trim().toLowerCase();
      if (!rawWord) {
        resultDiv.innerHTML = "<p>Please whisper a word into the spellbook.</p>";
        return;
      }

      const entry = dictionary[rawWord];

      if (!entry) {
        resultDiv.innerHTML = `
          <p class="word">${rawWord}</p>
          <p class="definition">This word is not in the spellbook yet.</p>
          <p class="life-tip">Every unknown word is an invitation to learn something new.</p>
        `;
        return;
      }

      resultDiv.innerHTML = `
        <p class="word">${rawWord}</p>
        <p class="definition">${entry.definition}</p>
        <p class="life-tip">${entry.lifeTip}</p>
      `;
    });
  </script>
</body>
</html>
