<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Charmed Spell Panel</title>
<style>
    body {
        font-family: "Georgia", serif;
        background: #f7f2ec;
        margin: 0;
        padding: 0;
        color: #3b2f2f;
    }

    header {
        text-align: center;
        padding: 20px;
        font-size: 2rem;
        letter-spacing: 2px;
        color: #5a3e3e;
        text-shadow: 0 0 6px #d7c3a3;
    }

    .panel {
        width: 90%;
        max-width: 800px;
        margin: 20px auto;
        background: #fffaf4;
        border: 3px solid #d8c2a1;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    .section-title {
        font-size: 1.4rem;
        margin-bottom: 10px;
        color: #6b4a3a;
        text-shadow: 0 0 4px #e8d5c0;
    }

    select, button {
        padding: 10px;
        border-radius: 8px;
        border: 2px solid #c7a88a;
        background: #fff3e6;
        font-size: 1rem;
        margin-top: 10px;
    }

    .spell-box {
        margin-top: 20px;
        padding: 15px;
        background: #fff7ef;
        border-left: 6px solid #c7a88a;
        border-radius: 8px;
        font-size: 1.2rem;
        line-height: 1.6;
        display: none;
    }

    .aura {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        font-weight: bold;
        display: none;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { box-shadow: 0 0 10px #e6d2c0; }
        to { box-shadow: 0 0 20px #c7a88a; }
    }
</style>
</head>
<body>

<header>✨ Charmed Spell Panel ✨</header>

<div class="panel">
    <div class="section-title">Choose a Character</div>
    <select id="characterSelect">
        <option value="">— Select —</option>
        <option value="Piper">Piper Halliwell</option>
        <option value="Phoebe">Phoebe Halliwell</option>
        <option value="Paige">Paige Matthews</option>
        <option value="Leo">Leo Wyatt</option>
    </select>

    <button onclick="showSpell()">Reveal Spell</button>

    <div id="spellBox" class="spell-box"></div>

    <div class="section-title" style="margin-top:25px;">Aura Toggle (Pure / Khloe)</div>
    <button onclick="toggleAura()">Activate Aura</button>
    <div id="auraBox" class="aura"></div>
</div>

<script>
function showSpell() {
    const character = document.getElementById("characterSelect").value;
    const box = document.getElementById("spellBox");

    const spells = {
        Piper: "Hail well, Piper — Keeper of calm, breaker of chaos. Freeze the moment, steady the path.",
        Phoebe: "Hail well, Phoebe — Heart of intuition. Let visions guide truth and protect the innocent.",
        Paige: "Hail well, Paige — Light of renewal. Orb the pieces together and restore what was broken.",
        Leo: "Hail well, Leo — Guardian of healing. Let your wisdom shield and your light restore."
    };

    if (character) {
        box.style.display = "block";
        box.textContent = spells[character];
    } else {
        box.style.display = "none";
    }
}

let auraOn = false;
function toggleAura() {
    const aura = document.getElementById("auraBox");
    auraOn = !auraOn;

    if (auraOn) {
        aura.style.display = "block";
        aura.textContent = "Pure / Khloe Aura Activated — gentle protection, clarity, and soft radiance.";
        aura.style.background = "#fde7ff";
        aura.style.color = "#7a3f7a";
    } else {
        aura.style.display = "none";
    }
}
</script>

</body>
</html>
