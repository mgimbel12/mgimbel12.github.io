<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fruit, Pizza & Dino Shop</title>
  <style>
    body { font-family: system-ui; background:#faf5ff; margin:0; padding:20px; }
    .row { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .card { flex:1 1 260px; background:white; border-radius:12px; padding:16px;
            box-shadow:0 4px 10px rgba(0,0,0,0.08); }
    .title { font-weight:700; margin-bottom:8px; }
    button { margin:4px; padding:6px 10px; border-radius:999px; border:1px solid #ccc;
             background:#fff; cursor:pointer; }
    button.active { background:#4f46e5; color:white; border-color:#4f46e5; }
    .money-total { font-size:1.3rem; font-weight:700; margin-top:8px; }
    svg { max-width:120px; display:block; margin-top:8px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="card" id="fruit-card">
      <div class="title">Fruit of the Vineyard</div>
      <div>
        <button data-fruit="Strawberries">Strawberries</button>
        <button data-fruit="Apples">Apples</button>
        <button data-fruit="Grapes">Grapes</button>
      </div>
      <p>Basket: <span id="fruit-count">0</span> items</p>
    </div>

    <div class="card" id="pizza-card">
      <div class="title">Pizza Builder</div>
      <div>
        <button data-topping="Hot Pepper">Hot Pepper</button>
        <button data-topping="Pineapple">Pineapple</button>
        <button data-topping="Ham">Ham</button>
        <button data-topping="Cheese">Cheese</button>
      </div>
      <!-- Simple SVG pizza placeholder -->
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" fill="#facc15" stroke="#b45309" stroke-width="4" />
        <!-- toppings will be “imagined” for now -->
      </svg>
      <p>Active toppings: <span id="toppings-list">None</span></p>
    </div>
  </div>

  <div class="row">
    <div class="card" id="dino-card">
      <div class="title">Dino Nugget Snack Shop</div>
      <p>Pay with coins & bills:</p>
      <div>
        <button data-value="0.05">Nickel</button>
        <button data-value="0.10">Dime</button>
        <button data-value="0.25">Quarter</button>
        <button data-value="1">Dollar</button>
        <button data-value="5">Five Dollars</button>
        <button data-value="10">Ten Dollars</button>
      </div>
      <div class="money-total">$<span id="money-total">0.00</span></div>
      <p>For: Dino Nuggets 🦕</p>
    </div>
  </div>

  <script>
    // Fruit basket
    let fruitCount = 0;
    document.querySelectorAll('#fruit-card button').forEach(btn => {
      btn.addEventListener('click', () => {
        fruitCount++;
        document.getElementById('fruit-count').textContent = fruitCount;
      });
    });

    // Pizza toppings
    const toppingButtons = document.querySelectorAll('#pizza-card button');
    const toppingsList = document.getElementById('toppings-list');
    toppingButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('active');
        const active = [...toppingButtons]
          .filter(b => b.classList.contains('active'))
          .map(b => b.dataset.topping);
        toppingsList.textContent = active.length ? active.join(', ') : 'None';
      });
    });

    // Money counter
    let total = 0;
    const moneyTotalEl = document.getElementById('money-total');
    document.querySelectorAll('#dino-card button[data-value]').forEach(btn => {
      btn.addEventListener('click', () => {
        total += parseFloat(btn.dataset.value);
        moneyTotalEl.textContent = total.toFixed(2);
      });
    });
  </script>
</body>
</html>
