<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nightmare Before Christmas SVG Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root {
    --bg: #0b0d16;
    --card: #111827;
    --accent: #38bdf8;
    --accent2: #f472b6;
    --accent3: #facc15;
    --text: #f9fafb;
    --muted: #9ca3af;
    --border: #1f2937;
    --font: system-ui, sans-serif;
  }

  body {
    margin: 0;
    font-family: var(--font);
    background: radial-gradient(circle at top, #1e293b 0, #0b0d16 60%);
    color: var(--text);
  }

  header {
    text-align: center;
    padding: 2rem 1rem;
    background: linear-gradient(135deg, #1e293b, #0b0d16);
  }

  header h1 {
    margin: 0;
    font-size: 2rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  header p {
    margin-top: 0.5rem;
    color: var(--muted);
  }

  main {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 1rem;
  }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  }

  .section h2 {
    margin-top: 0;
    font-size: 1.3rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .svg-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-top: 1rem;
  }

  svg {
    width: 120px;
    height: 120px;
  }

  footer {
    text-align: center;
    padding: 1rem;
    color: var(--muted);
    margin-top: 2rem;
  }
</style>
</head>

<body>

<header>
  <h1>Nightmare Before Christmas SVG Gallery</h1>
  <p>Zero • Jack • Sally • Mayor • Jack & Sally</p>
</header>

<main>

  <!-- ZERO -->
  <section class="section">
    <h2>Zero the Ghost Dog</h2>
    <div class="svg-row">
      <svg viewBox="0 0 64 64">
        <circle cx="32" cy="20" r="10" fill="#ffffff" />
        <ellipse cx="32" cy="40" rx="18" ry="12" fill="#e5e7eb" />
        <circle cx="38" cy="20" r="3" fill="#f97316" />
      </svg>
    </div>
  </section>

  <!-- JACK & PUMPKIN -->
  <section class="section">
    <h2>Jack Skellington & Pumpkin</h2>
    <div class="svg-row">
      <svg viewBox="0 0 64 64">
        <circle cx="32" cy="20" r="12" fill="#ffffff" />
        <circle cx="26" cy="18" r="3" fill="#000" />
        <circle cx="38" cy="18" r="3" fill="#000" />
        <path d="M24 24 Q32 30 40 24" stroke="#000" stroke-width="2" fill="none" />
        <circle cx="32" cy="46" r="10" fill="#f97316" />
      </svg>
    </div>
  </section>

  <!-- SALLY -->
  <section class="section">
    <h2>Sally</h2>
    <div class="svg-row">
      <svg viewBox="0 0 64 64">
        <circle cx="32" cy="22" r="12" fill="#f472b6" />
        <rect x="22" y="34" width="20" height="20" fill="#ec4899" />
        <line x1="26" y1="22" x2="38" y2="22" stroke="#000" stroke-width="2" />
      </svg>
    </div>
  </section>

  <!-- JACK & SALLY -->
  <section class="section">
    <h2>Jack & Sally Together</h2>
    <div class="svg-row">
      <svg viewBox="0 0 64 64">
        <circle cx="22" cy="22" r="10" fill="#ffffff" />
        <circle cx="42" cy="22" r="10" fill="#f472b6" />
        <rect x="14" y="32" width="16" height="20" fill="#1e293b" />
        <rect x="34" y="32" width="16" height="20" fill="#ec4899" />
      </svg>
    </div>
  </section>

  <!-- MAYOR -->
  <section class="section">
    <h2>Mayor of Halloween Town</h2>
    <div class="svg-row">
      <svg viewBox="0 0 64 64">
        <polygon points="32,10 20,30 44,30" fill="#facc15" />
        <rect x="22" y="30" width="20" height="24" fill="#fde68a" />
        <circle cx="32" cy="24" r="4" fill="#000" />
      </svg>
    </div>
  </section>

</main>

<footer>
  Single‑Sheet HTML • CSS • JavaScript — Nightmare Before Christmas SVG Gallery
</footer>

</body>
</html>
