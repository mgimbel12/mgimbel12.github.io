<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Christmas Rooftop Lights</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1b2b4b 0, #050814 55%, #02030a 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 900px;
      max-width: 100%;
      height: 420px;
      border-radius: 18px;
      background: linear-gradient(to top, #050814 0, #0b1020 40%, #151f3a 100%);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      overflow: hidden;
    }

    /* Stars */
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.7;
      animation: twinkle 2.5s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Moon */
    .moon {
      position: absolute;
      top: 40px;
      right: 80px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff 0, #f7f7ff 40%, #cfd5ff 70%, #9aa3ff 100%);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
    }

    /* Rooftop */
    .roof {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 120px;
      background: linear-gradient(135deg, #2b2b35, #15151c);
      clip-path: polygon(0 60%, 50% 0, 100% 60%, 100% 100%, 0 100%);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.7);
    }

    .roof-edge {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      width: 82%;
      height: 18px;
      background: linear-gradient(to bottom, #f5f5f5, #d0d0d0);
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    /* Chimney */
    .chimney {
      position: absolute;
      bottom: 210px;
      left: 58%;
      width: 70px;
      height: 90px;
      background: linear-gradient(to right, #5a1f1f, #3b1111);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.7);
    }

    .chimney-top {
      position: absolute;
      top: -12px;
      left: -8px;
      width: 86px;
      height: 18px;
      background: #2b0d0d;
      border-radius: 10px;
    }

    /* Santa silhouette */
    .santa {
      position: absolute;
      bottom: 230px;
      left: 18%;
      width: 140px;
      height: 80px;
      background: transparent;
    }

    .santa-body {
      position: absolute;
      bottom: 0;
      left: 40px;
      width: 60px;
      height: 40px;
      background: #000;
      border-radius: 40px 40px 20px 20px;
    }

    .santa-head {
      position: absolute;
      bottom: 30px;
      left: 60px;
      width: 26px;
      height: 26px;
      background: #000;
      border-radius: 50%;
    }

    .santa-hat {
      position: absolute;
      bottom: 46px;
      left: 58px;
      width: 32px;
      height: 18px;
      background: #000;
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
    }

    .santa-sleigh {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100px;
      height: 20px;
      border-radius: 0 0 20px 20px;
      border: 4px solid #000;
      border-top: none;
    }

    .santa-sleigh::before,
    .santa-sleigh::after {
      content: "";
      position: absolute;
      bottom: -6px;
      width: 40px;
      height: 4px;
      border-radius: 10px;
      border: 3px solid #000;
      border-top: none;
    }

    .santa-sleigh::before {
      left: 4px;
    }

    .santa-sleigh::after {
      right: 4px;
    }

    /* Light string */
    .light-string {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      width: 82%;
      height: 40px;
      pointer-events: none;
    }

    .light-wire {
      position: absolute;
      top: 8px;
      left: 0;
      width: 100%;
      height: 2px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.7);
    }

    .bulb {
      position: absolute;
      top: 10px;
      width: 14px;
      height: 22px;
      border-radius: 50% 50% 60% 60%;
      background: #ff4b4b;
      box-shadow: 0 0 10px rgba(255, 75, 75, 0.7);
      transform-origin: top center;
      animation: blink 1.4s infinite alternate ease-in-out, sway 1.8s infinite ease-in-out;
    }

    .bulb::before {
      content: "";
      position: absolute;
      top: -4px;
      left: 3px;
      width: 8px;
      height: 5px;
      border-radius: 3px;
      background: #444;
    }

    @keyframes blink {
      0% { opacity: 0.3; filter: brightness(0.7); }
      100% { opacity: 1; filter: brightness(1.4); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    .bulb.green {
      background: #3cff7a;
      box-shadow: 0 0 10px rgba(60, 255, 122, 0.7);
    }

    .bulb.blue {
      background: #4bc3ff;
      box-shadow: 0 0 10px rgba(75, 195, 255, 0.7);
    }

    .bulb.gold {
      background: #ffd54b;
      box-shadow: 0 0 10px rgba(255, 213, 75, 0.7);
    }

    /* Text */
    .greeting {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .greeting h1 {
      font-size: 1.8rem;
      color: #ffe9a9;
      text-shadow: 0 0 10px rgba(255, 233, 169, 0.8);
    }

    .greeting span {
      display: block;
      margin-top: 6px;
      font-size: 0.9rem;
      color: #cfd8ff;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="moon"></div>

    <div class="roof"></div>
    <div class="roof-edge"></div>

    <div class="chimney">
      <div class="chimney-top"></div>
    </div>

    <div class="santa">
      <div class="santa-sleigh"></div>
      <div class="santa-body"></div>
      <div class="santa-head"></div>
      <div class="santa-hat"></div>
    </div>

    <div class="light-string" id="lightString">
      <div class="light-wire"></div>
    </div>

    <div class="greeting">
      <h1>Merry Christmas</h1>
      <span>Santa on the rooftop, lights dancing in the cold night air.</span>
    </div>
  </div>

  <script>
    // Generate stars
    const scene = document.getElementById("scene");
    const starCount = 60;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement("div");
      star.classList.add("star");
      const x = Math.random() * 100;
      const y = Math.random() * 55; // upper sky
      const delay = Math.random() * 3;
      const size = Math.random() * 2 + 1;

      star.style.left = x + "%";
      star.style.top = y + "%";
      star.style.width = size + "px";
      star.style.height = size + "px";
      star.style.animationDelay = delay + "s";

      scene.appendChild(star);
    }

    // Generate bulbs along the roof edge
    const lightString = document.getElementById("lightString");
    const bulbColors = ["red", "green", "blue", "gold"];
    const colorClass = {
      red: "",
      green: "green",
      blue: "blue",
      gold: "gold"
    };

    const bulbCount = 22;
    for (let i = 0; i < bulbCount; i++) {
      const bulb = document.createElement("div");
      bulb.classList.add("bulb");

      const color = bulbColors[i % bulbColors.length];
      if (colorClass[color]) {
        bulb.classList.add(colorClass[color]);
      }

      const left = (i / (bulbCount - 1)) * 100;
      bulb.style.left = left + "%";

      const blinkOffset = (Math.random() * 0.8).toFixed(2);
      bulb.style.animationDelay = blinkOffset + "s";

      lightString.appendChild(bulb);
    }
  </script>
</body>
</html>
