<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fashion Concept Sheet — Editorial Layout</title>

<style>
  body {
    font-family: 'Didot', serif;
    margin: 0;
    padding: 0;
    background: #f7f5f4;
    color: #222;
    line-height: 1.65;
  }

  header {
    text-align: center;
    padding: 90px 20px 50px;
  }

  h1 {
    font-size: 3.6rem;
    letter-spacing: 3px;
    margin-bottom: 25px;
    font-weight: 300;
  }

  h2 {
    font-size: 2.3rem;
    margin-top: 90px;
    text-align: center;
    letter-spacing: 1px;
    font-weight: 300;
  }

  .hero {
    width: 360px;
    display: block;
    margin: 25px auto;
    border-radius: 8px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
  }

  /* Color Palette */
  .palette {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin: 55px 0;
  }

  .swatch {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #333;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .swatch:hover {
    transform: scale(1.18);
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }

  /* Look Area */
  .look-area {
    text-align: center;
    margin: 60px 0;
  }

  .look-area img {
    width: 340px;
    border-radius: 10px;
    transition: opacity 0.35s ease;
    box-shadow: 0 10px 22px rgba(0,0,0,0.1);
  }

  /* Fabric Wall */
  .fabric-wall {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 22px;
    padding: 20px 50px;
    margin-top: 30px;
  }

  .fabric {
    height: 170px;
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.08);
  }

  /* Notes */
  textarea {
    width: 82%;
    height: 240px;
    margin: 55px auto;
    display: block;
    padding: 18px;
    font-size: 1.15rem;
    border: 1px solid #bbb;
    border-radius: 10px;
    background: #fff;
    line-height: 1.55;
    box-shadow: 0 6px 14px rgba(0,0,0,0.05);
  }

  /* Divider */
  .divider {
    width: 68%;
    height: 2px;
    background: #d0cdcb;
    margin: 90px auto;
  }
</style>
</head>

<body>

<header>
  <h1>Fashion Concept Sheet</h1>
  <img src="https://i.pinimg.com/736x/7b/e8/1e/7be81e885163f2d1c32efb7b56a09655.jpg" class="hero" alt="Hero Sketch">
</header>

<div class="divider"></div>

<h2>Color Exploration</h2>

<section class="palette">
  <div class="swatch" style="background:#d7263d" onclick="setColor('red')"></div>
  <div class="swatch" style="background:#1b6ca8" onclick="setColor('blue')"></div>
  <div class="swatch" style="background:#111" onclick="setColor('black')"></div>
</section>

<section class="look-area">
  <img id="look" src="https://harunmudak.com/wp-content/uploads/2020/07/3fa5d7cc9e82a5000884790e0303f482-768x1056.jpg" alt="Fashion Look">
</section>

<div class="divider"></div>

<h2>Fabric & Texture Wall</h2>

<section class="fabric-wall">
  <div class="fabric" style="background-image:url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/81f1cb50356031.58ced098bc747.jpg')"></div>
  <div class="fabric" style="background-image:url('https://i.pinimg.com/736x/d3/90/76/d39076e6218216892dc26d5c018e421a.jpg')"></div>
  <div class="fabric" style="background-image:url('https://i.pinimg.com/originals/5a/48/c5/5a48c5c3a35dabe4c5152dd2a5c46fee.jpg')"></div>
  <div class="fabric" style="background-image:url('https://tse1.mm.bing.net/th/id/OIP.7-l2nEobnKkd7RI3SILSlgHaJF?rs=1&pid=ImgDetMain&o=7&rm=3')"></div>
</section>

<div class="divider"></div>

<h2>Designer Notes</h2>

<textarea placeholder="Silhouette ideas, construction notes, fabric pairings, color stories..."></textarea>

<div class="divider"></div>

<h2>Runway Variations</h2>

<section class="look-area">
  <img id="altLook" src="https://harunmudak.com/wp-content/uploads/2020/07/3fa5d7cc9e82a5000884790e0303f482-768x1056.jpg" alt="Alternate Look">
</section>

<script>
  const looks = {
    red: [
      "https://harunmudak.com/wp-content/uploads/2020/07/3fa5d7cc9e82a5000884790e0303f482-768x1056.jpg",
      "https://i.pinimg.com/736x/44/ed/77/44ed77c196f035ae78992302ccc00ce5.jpg",
      "https://img.freepik.com/premium-photo/3d-rendered-style-configuration-sketch-inventively-planned-design_1069963-16604.jpg"
    ],
    blue: [
      "https://thumbs.dreamstime.com/b/bright-blue-hand-sketch-style-dress-blue-background-sketch-dress-bright-blue-background-features-hand-drawn-310746779.jpg",
      "https://i.pinimg.com/736x/68/53/45/6853453f40a39f976776a474c1496654--drawing-fashion-fashion-sketches.jpg",
      "https://img.freepik.com/premium-photo/fashion-sketch-girl-beautiful-blue-evening-dress_1106981-645.jpg?w=2000"
    ],
    black: [
      "https://i.pinimg.com/736x/94/8d/94/948d944dadc1eaedb693854c89642140.jpg",
      "https://img.freepik.com/premium-photo/fashion-woman-model-sketch-design_910054-55040.jpg?w=996",
      "https://mir-s3-cdn-cf.behance.net/project_modules/1400_opt_1/71835341670871.57f9069a18c29.jpg"
    ]
  };

  let currentIndex = { red: 0, blue: 0, black: 0 };

  function setColor(color) {
    const img = document.getElementById("look");
    img.style.opacity = 0;

    setTimeout(() => {
      img.src = looks[color][currentIndex[color]];
      currentIndex[color] = (currentIndex[color] + 1) % looks[color].length;
      img.style.opacity = 1;
    }, 220);
  }
</script>

</body>
</html>
