<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fashion Concept Sheet</title>
<style>
  body {
    font-family: 'Didot', serif;
    margin: 0;
    padding: 0;
    background: #f7f5f4;
    color: #222;
  }

  header {
    text-align: center;
    padding: 60px 20px;
  }

  h1 {
    font-size: 3rem;
    letter-spacing: 2px;
  }

  .hero {
    width: 280px;
    display: block;
    margin: 20px auto;
  }

  .palette {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 40px 0;
  }

  .swatch {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #333;
  }

  .look-area {
    text-align: center;
    margin: 40px 0;
  }

  .look-area img {
    width: 260px;
    transition: 0.4s ease;
  }

  .fabric-wall {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    padding: 20px;
  }

  .fabric {
    height: 120px;
    background-size: cover;
    border-radius: 8px;
  }

  textarea {
    width: 90%;
    height: 180px;
    margin: 40px auto;
    display: block;
    padding: 12px;
    font-size: 1rem;
    border: 1px solid #aaa;
    border-radius: 6px;
  }
</style>
</head>

<body>

<header>
  <h1>Fashion Concept Sheet</h1>
  <img src="https://i.pinimg.com/736x/7b/e8/1e/7be81e885163f2d1c32efb7b56a09655.jpg" class="hero" alt="Hero Sketch">
</header>

<section class="palette">
  <div class="swatch" style="background:#d7263d" onclick="setColor('red')"></div>
  <div class="swatch" style="background:#1b6ca8" onclick="setColor('blue')"></div>
  <div class="swatch" style="background:#111" onclick="setColor('black')"></div>
</section>

<section class="look-area">
  <img id="look" src="https://harunmudak.com/wp-content/uploads/2020/07/3fa5d7cc9e82a5000884790e0303f482-768x1056.jpg" alt="Fashion Look">
</section>

<section class="fabric-wall">
  <div class="fabric" style="background-image:url('https://mir-s3-cdn-cf.behance.net/project_modules/1400/81f1cb50356031.58ced098bc747.jpg')"></div>
  <div class="fabric" style="background-image:url('https://i.pinimg.com/736x/d3/90/76/d39076e6218216892dc26d5c018e421a.jpg')"></div>
  <div class="fabric" style="background-image:url('https://i.pinimg.com/originals/5a/48/c5/5a48c5c3a35dabe4c5152dd2a5c46fee.jpg')"></div>
  <div class="fabric" style="background-image:url('https://tse1.mm.bing.net/th/id/OIP.7-l2nEobnKkd7RI3SILSlgHaJF?rs=1&pid=ImgDetMain&o=7&rm=3')"></div>
</section>

<textarea placeholder="Designer notes, fabric ideas, construction details..."></textarea>

<script>
  function setColor(color) {
    document.getElementById('look').src = `look-${color}.png`;
  }
</script>

</body>
</html>
